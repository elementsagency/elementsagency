<style>
/* COOKIE BANNER */
.cookie-banner { position: fixed; bottom: 1.5rem; left: 1.5rem; right: 1.5rem; z-index: 9999; background: #16160f; border-radius: 16px; padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; flex-wrap: wrap; box-shadow: 0 8px 40px rgba(0,0,0,0.25); transform: translateY(calc(100% + 2rem)); opacity: 0; transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease; pointer-events: none; }
.cookie-banner.visible { transform: translateY(0); opacity: 1; pointer-events: all; }
.cookie-banner-text { flex: 1; min-width: 220px; }
.cookie-banner-text p { font-family: 'DM Sans', sans-serif; font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.65; margin: 0; }
.cookie-banner-text a { color: rgba(255,255,255,0.9); text-decoration: underline; }
.cookie-banner-text a:hover { color: white; }
.cookie-banner-actions { display: flex; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
.cookie-btn { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 10px 22px; border-radius: 100px; border: none; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.cookie-btn-accept { background: #1a56db; color: white; }
.cookie-btn-accept:hover { background: #1447c0; transform: translateY(-1px); }
.cookie-btn-reject { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
.cookie-btn-reject:hover { background: rgba(255,255,255,0.15); color: white; }

@media (max-width: 600px) {
  .cookie-banner { bottom: 1rem; left: 1rem; right: 1rem; padding: 1.25rem; flex-direction: column; align-items: flex-start; gap: 1rem; }
  .cookie-banner-actions { width: 100%; }
  .cookie-btn { flex: 1; text-align: center; }
}
</style>

<div class="cookie-banner" id="cookie-banner" role="dialog" aria-label="Cookie consent">
  <div class="cookie-banner-text">
    <p>We use cookies to analyse traffic and improve your experience. See our <a href="/privacy-policy/">Privacy Policy</a> for details.</p>
  </div>
  <div class="cookie-banner-actions">
    <button class="cookie-btn cookie-btn-reject" id="cookie-reject">Reject all</button>
    <button class="cookie-btn cookie-btn-accept" id="cookie-accept">Accept all</button>
  </div>
</div>

<script>
(function() {
  var banner = document.getElementById('cookie-banner');
  var consent = localStorage.getItem('cookie-consent');

  // Load analytics if already accepted
  if (consent === 'accepted') {
    loadAnalytics();
  } else if (consent === null) {
    // Show banner after short delay
    setTimeout(function() {
      banner.classList.add('visible');
    }, 800);
  }

  document.getElementById('cookie-accept').addEventListener('click', function() {
    localStorage.setItem('cookie-consent', 'accepted');
    banner.classList.remove('visible');
    loadAnalytics();
  });

  document.getElementById('cookie-reject').addEventListener('click', function() {
    localStorage.setItem('cookie-consent', 'rejected');
    banner.classList.remove('visible');
  });

  function loadAnalytics() {
    // Load GA4
    var ga = document.createElement('script');
    ga.async = true;
    ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-9KRKN16PFN';
    document.head.appendChild(ga);
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9KRKN16PFN');

    // Load Meta Pixel
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window,document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1990809028417722');
    fbq('track', 'PageView');
  }
})();
</script>
